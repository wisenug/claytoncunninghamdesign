<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe Collection — 360°</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #111;
      --muted: #aaa;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* ── Section ── */
    .shoe-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      flex-shrink: 0;
    }

    /* ── Stage ── */
    .stage {
      position: relative;
      width: min(101.2vw, 644px);
      aspect-ratio: 1 / 0.85;
      cursor: grab;
      flex-shrink: 0;
    }

    .stage:active { cursor: grabbing; }

    .frame {
      position: absolute;
      inset: 0;
      display: none;
      opacity: 0;
    }

    .frame.active {
      display: block;
      opacity: 1;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* ── Loading overlay ── */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-bar {
      width: 120px;
      height: 1px;
      background: #ddd;
      position: relative;
      overflow: hidden;
    }

    .loader-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--fg);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* ── Meta ── */
    .meta {
      margin-top: 3.2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .meta h1 {
      font-size: clamp(0.8rem, 2vw, 1rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg);
    }

    .meta p {
      font-size: clamp(0.6rem, 1.5vw, 0.72rem);
      color: var(--muted);
      margin-top: 0.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Drag indicator arrows ── */
    .drag-arrows {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-top: 1.4rem;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .drag-arrows.visible { opacity: 1; }

    .drag-arrows svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--muted);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drag-arrows span {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- ═══ Reebok Kamikaze II ═══ -->
  <div class="shoe-section">
    <div class="stage" id="stage-reebok">
      <div class="loader" id="loader-reebok">
        <div class="loader-bar">
          <div class="loader-fill" id="loader-fill-reebok"></div>
        </div>
      </div>
    </div>
    <div class="meta">
      <h1>Reebok Kamikaze II</h1>
      <p>OG Black &middot; White &middot; Dark Green &middot; 2020</p>
      <div class="drag-arrows" id="drag-arrows-reebok">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Drag to rotate</span>
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>

  <!-- ═══ New Balance 992 ═══ -->
  <div class="shoe-section">
    <div class="stage" id="stage-nb992">
      <div class="loader" id="loader-nb992">
        <div class="loader-bar">
          <div class="loader-fill" id="loader-fill-nb992"></div>
        </div>
      </div>
    </div>
    <div class="meta">
      <h1>New Balance 992</h1>
      <p>MiUSA Grey &middot; Silver Metallic</p>
      <div class="drag-arrows" id="drag-arrows-nb992">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Drag to rotate</span>
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>

  <script>
    function createRotation(config) {
      const { stageId, loaderId, loaderFillId, dragArrowsId, frames } = config;
      const TOTAL = frames.length;
      const stage = document.getElementById(stageId);
      const loader = document.getElementById(loaderId);
      const loaderFill = document.getElementById(loaderFillId);
      const dragArrows = document.getElementById(dragArrowsId);

      let currentFrame = 0;
      let spinInterval = null;
      let isDragging = false;
      let dragStartX = 0;
      let dragStartFrame = 0;
      let loadedCount = 0;
      let ready = false;

      const frameEls = frames.map((src, i) => {
        const div = document.createElement('div');
        div.className = 'frame' + (i === 0 ? ' active' : '');
        const img = document.createElement('img');
        img.src = src;
        img.draggable = false;
        img.alt = '';
        div.appendChild(img);
        stage.appendChild(div);
        return div;
      });

      function showFrame(n) {
        const next = ((n % TOTAL) + TOTAL) % TOTAL;
        frameEls[currentFrame].classList.remove('active');
        frameEls[next].classList.add('active');
        currentFrame = next;
      }

      function startSpin() {
        if (spinInterval) return;
        spinInterval = setInterval(() => showFrame(currentFrame + 1), 75);
      }

      function stopSpin() {
        clearInterval(spinInterval);
        spinInterval = null;
      }

      // Preload
      frames.forEach((src) => {
        const img = new Image();
        img.onload = img.onerror = () => {
          loadedCount++;
          loaderFill.style.width = (loadedCount / TOTAL) * 100 + '%';
          if (loadedCount === TOTAL && !ready) {
            ready = true;
            setTimeout(() => {
              loader.classList.add('hidden');
              startSpin();
              setTimeout(() => dragArrows.classList.add('visible'), 1200);
            }, 300);
          }
        };
        img.src = src;
      });

      // Mouse drag
      stage.addEventListener('mousedown', e => {
        if (!ready) return;
        stopSpin();
        isDragging = true;
        dragStartX = e.clientX;
        dragStartFrame = currentFrame;
        e.preventDefault();
      });

      window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const delta = e.clientX - dragStartX;
        const sensitivity = stage.offsetWidth / TOTAL;
        showFrame(dragStartFrame + Math.round(delta / sensitivity));
      });

      window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        startSpin();
      });

      // Touch drag
      stage.addEventListener('touchstart', e => {
        if (!ready) return;
        stopSpin();
        isDragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartFrame = currentFrame;
      }, { passive: true });

      window.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const delta = e.touches[0].clientX - dragStartX;
        const sensitivity = stage.offsetWidth / TOTAL;
        showFrame(dragStartFrame + Math.round(delta / sensitivity));
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        startSpin();
      });
    }

    // ── Reebok Kamikaze II ──
    createRotation({
      stageId: 'stage-reebok',
      loaderId: 'loader-reebok',
      loaderFillId: 'loader-fill-reebok',
      dragArrowsId: 'drag-arrows-reebok',
      frames: Array.from({length: 36}, (_, i) =>
        `img/shoes/shoe-${String(i + 1).padStart(2, '0')}.png`
      )
    });

    // ── New Balance 992 ──
    createRotation({
      stageId: 'stage-nb992',
      loaderId: 'loader-nb992',
      loaderFillId: 'loader-fill-nb992',
      dragArrowsId: 'drag-arrows-nb992',
      frames: Array.from({length: 36}, (_, i) =>
        `img/shoes/nb992/nb992-${String(i + 1).padStart(2, '0')}.png`
      )
    });
  </script>

</body>
</html>
