  <style>
    :root {
      --color-bg: #ffffff;
      --color-black: #000000;
    }

    /* ── Capabilities page ── */
    .cap-header {
      padding: 7rem var(--page-margin) 4rem;
    }

    .cap-label {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 1.6rem;
    }

    .cap-title {
      font-size: clamp(5.6rem, 8.3vw + 1.5rem, 14.4rem);
      font-weight: 800;
      line-height: 0.97;
      letter-spacing: -0.035em;
      max-width: 14ch;
    }

    .cap-description {
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.6;
      max-width: 52ch;
      margin-top: 3.2rem;
      opacity: 0.75;
    }

    /* ── 2-up project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.6rem;
      padding: 6rem var(--page-margin) 12rem;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      position: relative;
    }

    .project-card__ink-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      border-radius: var(--radius-img);
    }

    .project-card__img-wrap {
      overflow: hidden;
      border-radius: var(--radius-img) var(--radius-img) 0 0;
      line-height: 0;
    }

    .project-card__image {
      width: 100%;
      display: block;
      object-fit: contain;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .project-card:hover .project-card__image {
      transform: scale(1.04);
    }

    .project-card__label-client {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .project-card__label {
      padding: 2rem 2.4rem 2.4rem;
      background: #E3F2FF;
      color: #001F6E;
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      box-sizing: border-box;
      border-radius: 0 0 var(--radius-img) var(--radius-img);
    }


    /* ── Divider ── */
    .cap-divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.15);
      margin: 0 var(--page-margin) 8rem;
    }

    /* ── Sticky filter bar ── */
    .cap-filter-bar {
      position: sticky;
      top: 10rem;
      z-index: 90;
      background-color: var(--color-bg);
      padding: 1.4rem var(--page-margin);
      border-bottom: none;
      transition: top 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .cap-filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }

    /* Reset chip */
    .tag--reset {
      opacity: 0.55;
    }

    .tag--reset:hover {
      opacity: 1;
      background: var(--color-black);
      color: var(--color-bg);
      border-color: var(--color-black);
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .project-grid {
        grid-template-columns: 1fr;
        gap: 4rem;
      }
    }
  </style>
