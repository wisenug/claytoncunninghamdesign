<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="img/clayton-cunningham-design-logo.svg">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="apple-touch-icon" href="img/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Clayton Cunningham's design capabilities — product design, illustration systems, design systems, UX, visual design, and more.">
  <title>Capabilities — Clayton Cunningham</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300;1,9..40,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --color-bg: #000000;
      --color-black: #ffffff;
    }

    /* ── Capabilities page ── */
    .cap-header {
      padding: 7rem var(--page-margin) 4rem;
    }

    .cap-label {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 1.6rem;
    }

    .cap-title {
      font-size: clamp(5.6rem, 8.3vw + 1.5rem, 14.4rem);
      font-weight: 800;
      line-height: 0.97;
      letter-spacing: -0.035em;
      max-width: 14ch;
    }

    .cap-description {
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.6;
      max-width: 52ch;
      margin-top: 3.2rem;
      opacity: 0.75;
    }

    /* ── 2-up project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.6rem;
      padding: 6rem var(--page-margin) 12rem;
    }

    .project-card {
      display: block;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-img);
    }

    .project-card__ink-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    .project-card__image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border-radius: 0;
      transform: scale(1);
      transition: transform 0.5s cubic-bezier(1, 0, 1, 1);
    }

    .project-card:hover .project-card__image,
    .project-card.is-active .project-card__image {
      transform: scale(1.14);
      transition: transform 1.1s linear(0, 0.1206, 0.2168, 0.3001, 0.3741, 0.4409, 0.5016, 0.5572, 0.6083, 0.6555, 0.699, 0.7394, 0.7768, 0.8114, 0.8435, 0.8733, 0.9008, 0.9263, 0.9499, 0.9715, 0.9915, 1.0097, 1.0264, 1.0415, 1.0552, 1.0676, 1.0785, 1.0882, 1.0967, 1.104, 1.1101, 1.1151, 1.1191, 1.122, 1.1239, 1.1249, 1.1249, 1.1244, 1.1234, 1.1218, 1.1198, 1.1172, 1.1142, 1.1109, 1.1072, 1.1033, 1.0992, 1.095, 1.0907, 1.0865, 1.0823, 1.0782, 1.0741, 1.0702, 1.0664, 1.0627, 1.0591, 1.0557, 1.0525, 1.0493, 1.0463, 1.0435, 1.0407, 1.0381, 1.0356, 1.0332, 1.031, 1.0288, 1.0268, 1.0248, 1.023, 1.0212, 1.0195, 1.018, 1.0165, 1.0151, 1.0137, 1.0125, 1.0113, 1.0102, 1.0091, 1.0082, 1.0073, 1.0064, 1.0056, 1.0049, 1.0042, 1.0036, 1.003, 1.0025, 1.0021, 1.0017, 1.0013, 1.001, 1.0007, 1.0005, 1.0003, 1.0002, 1.0001, 1, 1);
    }

    .project-card__label-client {
      display: block;
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .project-card__label {
      position: absolute;
      bottom: -3rem;
      left: 0;
      right: 0;
      padding: 2rem 2.4rem 3.6rem;
      background: #E3F2FF;
      color: #001F6E;
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      box-sizing: border-box;
      transform: translateY(101%);
      transition: transform 0.5s cubic-bezier(1, 0, 1, 1);
    }

    .project-card:hover .project-card__label,
    .project-card.is-active .project-card__label {
      transform: translateY(0);
      transition: transform 0.8s linear(0, 0.1206, 0.2168, 0.3001, 0.3741, 0.4409, 0.5016, 0.5572, 0.6083, 0.6555, 0.699, 0.7394, 0.7768, 0.8114, 0.8435, 0.8733, 0.9008, 0.9263, 0.9499, 0.9715, 0.9915, 1.0097, 1.0264, 1.0415, 1.0552, 1.0676, 1.0785, 1.0882, 1.0967, 1.104, 1.1101, 1.1151, 1.1191, 1.122, 1.1239, 1.1249, 1.1249, 1.1244, 1.1234, 1.1218, 1.1198, 1.1172, 1.1142, 1.1109, 1.1072, 1.1033, 1.0992, 1.095, 1.0907, 1.0865, 1.0823, 1.0782, 1.0741, 1.0702, 1.0664, 1.0627, 1.0591, 1.0557, 1.0525, 1.0493, 1.0463, 1.0435, 1.0407, 1.0381, 1.0356, 1.0332, 1.031, 1.0288, 1.0268, 1.0248, 1.023, 1.0212, 1.0195, 1.018, 1.0165, 1.0151, 1.0137, 1.0125, 1.0113, 1.0102, 1.0091, 1.0082, 1.0073, 1.0064, 1.0056, 1.0049, 1.0042, 1.0036, 1.003, 1.0025, 1.0021, 1.0017, 1.0013, 1.001, 1.0007, 1.0005, 1.0003, 1.0002, 1.0001, 1, 1);
    }

    /* ── Divider ── */
    .cap-divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.15);
      margin: 0 var(--page-margin) 8rem;
    }

    /* ── Sticky filter bar ── */
    .cap-filter-bar {
      position: sticky;
      top: 10rem;
      z-index: 90;
      background-color: var(--color-bg);
      padding: 1.4rem var(--page-margin);
      border-bottom: none;
      transition: top 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .cap-filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }

    /* Reset chip */
    .tag--reset {
      opacity: 0.55;
    }

    .tag--reset:hover {
      opacity: 1;
      background: var(--color-black);
      color: var(--color-bg);
      border-color: var(--color-black);
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .project-grid {
        grid-template-columns: 1fr;
        gap: 4rem;
      }

      .cap-header {
        padding-top: 7rem;
      }

      .cap-filter-bar {
        top: 10rem;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-icon" aria-hidden="true"></span>
      <span class="nav-logo-name">Clayton Cunningham Design</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" aria-current="page">Work</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>

    <!-- Header -->
    <header class="cap-header fade-up fade-up-1">
      <h2 class="cap-label">Capabilities</h2>
      <h1 class="cap-title" id="cap-title"></h1>
    </header>

    <!-- Sticky filter bar -->
    <div class="cap-filter-bar" id="cap-filter-bar">
      <div class="cap-filter-chips" id="cap-filter-chips"></div>
    </div>

    <!-- Project grid — populated by JS -->
    <div class="project-grid" id="project-grid"></div>

  </main>

  <footer>
    <p class="footer-copy">&copy; <span id="footer-year"></span> Clayton Cunningham Design.</p>
  </footer>

  <script>
    // Hide nav on scroll down, reveal on scroll up
    (function() {
      var nav = document.querySelector('nav');
      var lastY = 0;
      window.addEventListener('scroll', function() {
        var y = window.scrollY;
        if (y > lastY && y > 80) {
          nav.classList.add('nav--hidden');
        } else {
          nav.classList.remove('nav--hidden');
        }
        lastY = y;
      }, { passive: true });
    })();

    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // ── Project data ──────────────────────────────────────────────────────────
    var PROJECTS = [
      // ── To add a new project with a view transition, set bgColor and fgColor
      //    to match the project page's --color-bg and --color-black values.
      {
        href: 'sketches-illustrations-doodles.html',
        bgColor: '#4D93FC',
        fgColor: '#19133A',
        image: 'img/sketch_thumbnail.jpg',
        alt: 'Sketches, illustrations, and doodles',
        client: 'Personal',
        title: 'Sketches, Illustrations and Doodles',
        label: 'A collection of drawn things',
        tags: ['Illustration System']
      },
      {
        href: 'tshq-mobile-app.html',
        bgColor: '#006554',
        fgColor: '#E0FAE0',
        image: 'img/tshq_app_thumbnail.png',
        alt: 'DICK\'S TSHQ mobile app',
        client: 'DICK\'S TSHQ',
        title: 'DICK\'S TSHQ Mobile App',
        label: 'Designing mobile app features that ease the pain of youth sports management',
        tags: ['Product Design', 'UX', 'Illustration System']
      },
      {
        href: 'tshq-registration.html',
        bgColor: '#f0f0f0',
        fgColor: '#1B561A',
        image: 'img/tshq_reg_thumbnail.gif',
        alt: 'DICK\'S TSHQ Registration Redesign',
        client: 'DICK\'S TSHQ',
        title: 'Registration Redesign',
        label: 'Redesigning youth sports registration for over 3 million players and 10,000 teams',
        tags: ['Product Design', 'UX']
      },
      {
        href: 'tshq-fanwear-redesign.html',
        bgColor: '#FF5F1F',
        fgColor: '#0D0D1A',
        image: 'img/tshq_fanwear_thumbnail.png',
        alt: 'DICK\'S TSHQ Fan Wear Redesign',
        client: 'DICK\'S TSHQ',
        title: 'Fan Wear',
        label: 'Designing a standalone fan wear store that turned team spirit into club revenue',
        tags: ['Product Design', 'UX', 'Ecommerce']
      },
      {
        href: 'tshq-assorted-projects.html',
        bgColor: '#2E1F4A',
        fgColor: '#F0E6FF',
        image: 'img/tshq_assorted_projects_thumbnail.png',
        alt: 'DICK\'S TSHQ Assorted Projects',
        client: 'DICK\'S TSHQ',
        title: 'Assorted',
        label: 'Selected works from DICK\'s Team Sports Headquarters',
        tags: ['Product Design', 'Brand Identity']
      },
      {
        href: 'logos.html',
        bgColor: '#FFF8D5',
        fgColor: '#553B06',
        image: 'img/lotuslion_thumbnail.jpg',
        alt: 'Logos and brand identity work',
        client: 'Various',
        title: 'Logos',
        label: 'A collection of logo and brand identity work',
        tags: ['Brand Identity']
      },
      {
        href: 'coca-cola-assorted-projects.html',
        bgColor: '#ffffff',
        fgColor: '#F02D2D',
        image: 'img/cc_misc_BIG_PAC_website.jpg',
        alt: 'Coca-Cola Assorted Projects',
        client: 'Coca-Cola',
        title: 'Assorted Projects',
        label: 'Designing for one of the world\'s most iconic brands',
        tags: ['Brand Identity', 'Digital Design']
      },
      {
        href: 'coca-cola-campus-messaging.html',
        bgColor: '#000000',
        fgColor: '#ffffff',
        image: 'img/cm_thumbnail.jpg',
        alt: 'Coca-Cola Campus Messaging',
        client: 'Coca-Cola',
        title: 'Campus Messaging',
        label: 'Unified campus communication experiences across Coca-Cola\'s world headquarters',
        tags: ['Digital Design', 'Brand Expression']
      },
      {
        href: 'paradesmith.html',
        bgColor: '#1BBFCA',
        fgColor: '#07465A',
        image: 'img/paradesmith_thumbnail.jpg',
        alt: 'Paradesmith',
        client: 'Paradesmith',
        title: 'MVP Design',
        label: 'Building an MVP to transform scattered online content into curated community experiences',
        tags: ['Product Design', 'UX', 'Brand Identity']
      },
      {
        href: 'autotrader-illustration-system.html',
        bgColor: '#E3F2FF',
        fgColor: '#0F2960',
        image: 'img/at_illustration_style_2.png',
        alt: 'Autotrader illustration system',
        client: 'Autotrader',
        title: 'Illustration System',
        label: 'Designing a scalable illustration system across web, mobile apps, and marketing',
        tags: ['Illustration System', 'Design Systems']
      },
      {
        href: 'kbb-icons-illustrations.html',
        bgColor: '#FFBF00',
        fgColor: '#002B5C',
        image: 'img/Kbb_thumbnail.png',
        alt: 'KBB icons and illustrations',
        client: 'Kelley Blue Book',
        title: 'Icons & Illustrations',
        label: 'Growing a renowned leader\'s visual library',
        tags: ['Icon Design', 'Illustration System', 'Design Systems', 'Brand Expression']
      },
      {
        href: 'autotrader-icons.html',
        bgColor: '#FF8806',
        fgColor: '#001F6E',
        image: 'img/autotrader_icons_thumbnail.png',
        alt: 'Autotrader iconography system',
        client: 'Autotrader',
        title: 'Iconography',
        label: 'Unifying a fragmented icon language',
        tags: ['Icon Design', 'Brand Expression']
      },
      {
        href: '#',
        image: 'img/at_illustration_style_3_ui.png',
        alt: 'Autotrader product UI',
        client: 'Autotrader',
        title: 'Sell Your Car Center',
        tags: ['Product Design', 'UX']
      },
      {
        href: '#',
        image: 'img/at_illustration_style_29.png',
        alt: 'Vehicle detail page',
        client: 'Autotrader',
        title: 'Vehicle Details Page',
        tags: ['Product Design', 'Brand Expression']
      },
      {
        href: '#',
        image: 'img/at_illustration_style_27.png',
        alt: 'Autotrader At Home Services',
        client: 'Autotrader',
        title: 'At Home Services',
        tags: ['Product Design']
      },
      {
        href: '#',
        image: 'img/at_illustration_style_32.png',
        alt: 'Figma component library',
        client: 'Autotrader',
        title: 'Design System Library',
        tags: ['Design Systems', 'Figma']
      },
      {
        href: '#',
        image: 'img/at_illustration_style_21.png',
        alt: 'Mobile app UI with characters',
        client: 'Autotrader',
        title: 'Mobile App Experience',
        tags: ['Product Design', 'Illustration System']
      }
    ];

    // ── Tag metadata: title + description for each tag ────────────────────────
    var TAG_META = {
      'Product Design': {
        title: 'Product Design',
        description: 'End-to-end product design across automotive, enterprise, and consumer platforms. From early concept through shipped product.'
      },
      'Icon Design': {
        title: 'Icon Design',
        description: 'Unified icon systems built on precise grids, optical corrections, and systematic rules — spanning UI, spot, and navigation icons.'
      },
      'Illustration System': {
        title: 'Illustration System',
        description: 'Custom illustration systems built to scale across product, marketing, and brand — with rules for how to extend them.'
      },
      'Design Systems': {
        title: 'Design Systems',
        description: 'Component libraries, style guides, and design infrastructure built to last and scale across teams.'
      },
      'Visual Design': {
        title: 'Visual Design',
        description: 'Craft-led visual work — from interface polish to editorial layouts and motion-ready assets.'
      },
      'Brand Expression': {
        title: 'Brand Expression',
        description: 'Brand identity and expression work that extends naturally into product, marketing, and beyond.'
      },
      'UX': {
        title: 'UX',
        description: 'User experience strategy, interaction design, and research-informed flows that reduce friction and build confidence.'
      },
      'Figma': {
        title: 'Figma',
        description: 'Figma-based component libraries, design tooling, and shared systems that keep teams moving fast.'
      }
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    function slugify(str) {
      return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    }

    // ── Render ────────────────────────────────────────────────────────────────
    var params = new URLSearchParams(window.location.search);
    var activeTag = params.get('tag') || '';

    var meta = activeTag && TAG_META[activeTag]
      ? TAG_META[activeTag]
      : { title: 'All Capabilities', description: 'Selected projects across product design, illustration, design systems, and brand expression.' };

    document.getElementById('cap-title').textContent = meta.title;
    document.title = meta.title + ' — Clayton Cunningham';

    // ── Filter chips ──────────────────────────────────────────────────────────
    var chipsContainer = document.getElementById('cap-filter-chips');

    // Reset chip — only shown when a filter is active
    if (activeTag) {
      var resetChip = document.createElement('a');
      resetChip.href = 'capabilities.html';
      resetChip.className = 'tag tag--reset';
      resetChip.textContent = 'See All';
      chipsContainer.appendChild(resetChip);
    }

    // One chip per capability
    Object.keys(TAG_META).forEach(function(tag) {
      var chip = document.createElement('a');
      chip.href = 'capabilities.html?tag=' + encodeURIComponent(tag);
      chip.className = 'tag' + (tag === activeTag ? ' tag--active' : '');
      chip.textContent = tag;
      chipsContainer.appendChild(chip);
    });

    // View transition: mark the active chip as the morph target for incoming transitions from project pages
    if (activeTag) {
      var activeChipEl = chipsContainer.querySelector('.tag--active');
      if (activeChipEl) activeChipEl.style.viewTransitionName = 'active-chip';
    }

    // Sync filter bar top with nav visibility
    (function() {
      var nav = document.querySelector('nav');
      var bar = document.getElementById('cap-filter-bar');
      if (!nav || !bar) return;
      new MutationObserver(function() {
        bar.style.top = nav.classList.contains('nav--hidden') ? '0' : '10rem';
      }).observe(nav, { attributes: true, attributeFilter: ['class'] });
    })();

    // ── Project grid ──────────────────────────────────────────────────────────
    var filtered = activeTag
      ? PROJECTS.filter(function(p) { return p.tags.indexOf(activeTag) !== -1; })
      : PROJECTS;

    var grid = document.getElementById('project-grid');
    filtered.forEach(function(p, i) {
      var delay = (i % 2 === 0) ? 'fade-up-2' : 'fade-up-3';

      var card = document.createElement('a');
      card.href = p.href;
      card.className = 'project-card fade-up ' + delay;
      card.innerHTML =
        '<div class="project-card__ink-bg" aria-hidden="true"></div>' +
        '<img class="project-card__image" src="' + p.image + '" alt="' + p.alt + '" loading="lazy">' +
        '<div class="project-card__label"><span class="project-card__label-client">' + p.client + '</span>' + (p.label || p.title) + '</div>';

      if (p.href !== '#' && p.bgColor) {
        var inkEl = card.querySelector('.project-card__ink-bg');
        var labelEl = card.querySelector('.project-card__label');
        inkEl.style.background = p.bgColor;
        labelEl.style.background = p.bgColor;
        if (p.fgColor) labelEl.style.color = p.fgColor;
        card.addEventListener('click', function() {
          inkEl.style.opacity = '1';
          inkEl.style.viewTransitionName = 'ink-bg';
          card.querySelector('.project-card__label').style.viewTransitionName = 'page-title';
        });
      }

      grid.appendChild(card);
    });

    // Skip view transition on back/forward navigation
    window.addEventListener('pagereveal', function(e) {
      if (e.viewTransition && navigation?.activation?.navigationType === 'traverse') {
        e.viewTransition.skipTransition();
      }
    });

    // Card overlay: tap-to-reveal on touch devices
    (function () {
      function getCards() { return Array.from(document.querySelectorAll('.project-card')); }
      function clearAll(except) {
        getCards().forEach(function (c) { if (c !== except) c.classList.remove('is-active'); });
      }
      function bindCard(card) {
        card.addEventListener('touchend', function (e) {
          var isActive = card.classList.contains('is-active');
          clearAll(card);
          if (isActive) {
            card.classList.remove('is-active');
          } else {
            e.preventDefault();
            card.classList.add('is-active');
          }
        }, { passive: false });
      }
      // Bind existing cards and any dynamically added ones via MutationObserver
      getCards().forEach(bindCard);
      new MutationObserver(function (mutations) {
        mutations.forEach(function (m) {
          m.addedNodes.forEach(function (n) {
            if (n.classList && n.classList.contains('project-card')) bindCard(n);
          });
        });
      }).observe(document.body, { childList: true, subtree: true });
      document.addEventListener('touchend', function (e) {
        if (!e.target.closest('.project-card')) clearAll(null);
      });
    })();
  </script>

</body>
