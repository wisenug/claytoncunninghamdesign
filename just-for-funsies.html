  <style>
    :root {
      --color-bg: #b8e4f0;
      --color-black: #0F3D4A;
    }

    .vt-bg {
      position: fixed;
      inset: 0;
      background-color: #b8e4f0;
      z-index: -1;
      pointer-events: none;
      view-transition-name: ink-bg;
    }

    .project-title { view-transition-name: page-title; }

    /* View transition — outgoing (to next project); names assigned via JS on click */
    .next-project-title { position: relative; }
    .next-label         { position: relative; }

    .footer-copy {
      color: #0F3D4A;
    }

    /* ── Two-column card grid, same treatment as the home page ── */
    .funsies-grid {
      padding: 4rem var(--page-margin) 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.6rem;
      align-items: start;
    }

    .work-card {
      position: relative;
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .work-card__img-wrap {
      overflow: hidden;
      border-radius: var(--radius-img) var(--radius-img) 0 0;
      line-height: 0;
    }

    .work-img {
      width: 100%;
      display: block;
      object-fit: contain;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .work-card:hover .work-img  { transform: scale(1.04); }
    .work-card:active .work-img { transform: scale(1.02); }

    .work-card__label-client {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .work-card__label {
      padding: 2rem 2.4rem 2.4rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      box-sizing: border-box;
      border-radius: 0 0 var(--radius-img) var(--radius-img);
    }

    @media (max-width: 640px) {
      .funsies-grid {
        grid-template-columns: 1fr;
        padding-top: 2.4rem;
        gap: 2.4rem;
      }
    }
  </style>
