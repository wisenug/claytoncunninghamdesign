
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clayton Cunningham Design</title>
  <meta name="description" content="Portfolio website for Clayton Cunningham Design, specializing in branding, UI/UX, and digital product design.">
  <meta name="author" content="Clayton Cunningham Design">

  <meta property="og:title" content="Clayton Cunningham Design">
  <meta property="og:description" content="Portfolio website for Clayton Cunningham Design, specializing in illustration, branding, UI/UX, and digital product design.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@claytondesign">
  <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png">
  
  <!-- Favicon -->
  <link rel="icon" href="./img/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="./img/logo.png">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="./styles.css">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'active-link': '#a1c565',
            'hover-link': '#768c4c'
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Scripts -->
  <script src="./components.js" defer></script>
  <script src="./scripts.js" defer></script>
  <script src="./accessibility.js" defer></script>
  <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
</head>
<body>
  <!-- Skip link for keyboard users -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <!-- Header will be inserted by JavaScript -->
  <div id="header-container"></div>
  
  <main id="main-content" tabindex="-1">
    <div class="animate-fade-in">
      <section class="py-20">
        <div class="portfolio-container">
          <div class="max-w-2xl slide-up">
            <h1 class="mb-6">Design studio specializing in digital experiences, logos & illustrations</h1>
          </div>
        </div>
      </section>
      
      <section class="pb-20">
        <div class="portfolio-container">
          <div class="project-grid">
            <a href="./project-grayscale.html" class="group" aria-label="View Grayscale project">
              <div class="project-card">
                <img src="./img/grayscale.png" alt="Grayscale project thumbnail showing monochromatic design work" loading="lazy" width="600" height="480">
              </div>
            </a>
            <a href="./project-autotrader-illustration-simplified.html" class="group" aria-label="View Autotrader Illustration Style project">
              <div class="project-card">
                <img src="./img/autotrader-illustration.png" alt="Autotrader Illustration Style showing brand illustrations" loading="lazy" width="600" height="480">
              </div>
            </a>
            <a href="./project-autotrader-icons.html" class="group" aria-label="View Autotrader Icons project">
              <div class="project-card">
                <img src="./img/autotrader-icons.png" alt="Autotrader Icons project showing icon design system" loading="lazy" width="600" height="480">
              </div>
            </a>
            <a href="./project-juice-and-co-brand-refresh.html" class="group" aria-label="View Juice & Co Brand Refresh project">
              <div class="project-card">
                <img src="./img/juice-and-co.png" alt="Juice & Co Brand Refresh showing updated brand identity" loading="lazy" width="600" height="480">
              </div>
            </a>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer will be inserted by JavaScript -->
  <div id="footer-container"></div>

  <script>
    // Initialize components on page load
    document.addEventListener('DOMContentLoaded', function() {
      // Load header and footer
      loadComponents('work');
    });
  </script>
</body>
</html>
