  <style>
    :root {
      --color-bg: #ffffff;
      --color-black: #F02D2D;

    /* ── View transition ── */
    .vt-bg {
      position: fixed;
      inset: 0;
      background-color: #ffffff;
      z-index: -1;
      pointer-events: none;
      view-transition-name: ink-bg;
    }

    .project-title { view-transition-name: page-title; }

    /* ── Inverted tag hover ── */
    .tag {
      border-color: rgba(240, 45, 45, 0.4);
      color: rgba(240, 45, 45, 0.7);
    }

    .tag:hover,
    .tag--active {
      background: #F02D2D;
      color: #ffffff;
      border-color: #F02D2D;
    }

    .img-caption {
      color: rgba(240, 45, 45, 0.5);
    }

    .footer-copy {
      color: #F02D2D;
    }

    /* ── Scroll reveal ── */
    .scroll-reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .scroll-reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

  </script>
  <script>
    // Scroll reveal
    (function() {
      var els = document.querySelectorAll('.scroll-reveal');
      if (!els.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });
      els.forEach(function(el) { observer.observe(el); });
    })();

    window.addEventListener('pagereveal', function(e) {
      if (e.viewTransition && navigation?.activation?.navigationType === 'traverse') {
        e.viewTransition.skipTransition();
      }
    });

    (function() {
      var nav = document.querySelector('nav');
      var lastY = 0;
      window.addEventListener('scroll', function() {
        var y = window.scrollY;
        if (y > lastY && y > 80) {
          nav.classList.add('nav--hidden');
        } else {
          nav.classList.remove('nav--hidden');
        }
        lastY = y;
      }, { passive: true });
    })();
  </script>

  <script>
    (function () {
      var hero = document.querySelector('.hero-image');
      var heroImg = hero && hero.querySelector('img');
      if (!hero || !heroImg) return;
      function updateHero() {
        var p = Math.min(1, Math.max(0, window.scrollY / 400));
        var pad = (5 * (1 - p)).toFixed(3);
        var rad = (0.8 * (1 - p)).toFixed(3);
        hero.style.paddingLeft  = pad + 'vw';
        hero.style.paddingRight = pad + 'vw';
        heroImg.style.borderRadius = rad + 'rem';
      }
      window.addEventListener('scroll', updateHero, { passive: true });
      updateHero();
    })();
  </script>

  <script>
    document.querySelectorAll("a.tag[href*=\"capabilities\"]").forEach(function(t) {
      t.addEventListener("click", function() { t.style.viewTransitionName = "active-chip"; });
    });
